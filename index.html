<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Familia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8001D;
    --black: #080808;
    --white: #FFFFFF;
    --gray: #8A8A8A;
    --surface: #111111;
    --border: #222222;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(8,8,8,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .nav-logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
  }
  .nav-logo span { color: var(--red); }

  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }

  .nav-admin-btn {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 20px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    background: transparent;
    color: var(--white);
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-admin-btn:hover { background: rgba(255,255,255,0.08); }

  /* ─── HERO ─── */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .hero-title {
    font-size: clamp(72px, 12vw, 140px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 0.9;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }
  .hero-title .red { color: var(--red); }

  .hero-sub {
    margin-top: 24px;
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  /* TROPHY */
  .trophy-container {
    position: relative;
    margin-top: 60px;
    width: 180px;
    height: 260px;
    opacity: 0;
    animation: fadeUp 1s 0.8s forwards;
    perspective: 800px;
  }

  .trophy-inner {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.05s linear;
    will-change: transform;
  }

  /* SVG Trophy */
  .trophy-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 40px rgba(232,0,29,0.3)) drop-shadow(0 20px 40px rgba(0,0,0,0.8));
  }

  .scroll-hint {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeIn 1s 1.5s forwards;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3));
    animation: scrollPulse 1.5s ease-in-out infinite;
  }

  /* ─── TICKER SECTION ─── */
  .ticker-section {
    padding: 100px 0;
    max-width: 960px;
    margin: 0 auto;
    padding-left: 24px;
    padding-right: 24px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 56px;
    color: var(--white);
  }

  /* Game Cards */
  .games-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .game-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 24px;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }
  .game-card.live::before { background: var(--red); }
  .game-card.upcoming::before { background: #555; }
  .game-card.finished::before { background: #333; }

  .game-card:hover { background: #161616; }

  .team {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .team.home { align-items: flex-start; }
  .team.away { align-items: flex-end; }

  .team-flag {
    font-size: 36px;
    line-height: 1;
  }

  .team-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--white);
  }

  .game-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 120px;
  }

  .score {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--white);
    font-variant-numeric: tabular-nums;
  }

  .game-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .phase-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(232,0,29,0.15);
    color: var(--red);
    border: 1px solid rgba(232,0,29,0.2);
  }
  .phase-badge.upcoming-badge {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.1);
  }
  .phase-badge.finished-badge {
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.07);
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--red);
    text-transform: uppercase;
  }
  .dot {
    width: 6px;
    height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }

  .game-time {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
  }

  /* ─── ADMIN MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #141414;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  .modal-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .modal-sub {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 36px;
  }

  .input-group { margin-bottom: 20px; }
  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 8px;
  }
  .input-group input, .input-group select {
    width: 100%;
    background: #1E1E1E;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    font-family: inherit;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: rgba(232,0,29,0.5);
  }
  .input-group input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--red);
    color: white;
  }
  .btn-primary:hover { background: #ff0020; }

  .btn-secondary {
    background: #222;
    color: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #2a2a2a; }

  .error-msg {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ─── ADMIN PANEL ─── */
  .admin-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: #0A0A0A;
    z-index: 999;
    overflow-y: auto;
  }
  .admin-panel.open { display: block; }

  .admin-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: #0A0A0A;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .admin-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .admin-title span { color: var(--red); }

  .close-btn {
    background: #1E1E1E;
    border: 1px solid var(--border);
    color: var(--white);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .close-btn:hover { background: #2a2a2a; }

  .admin-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  .admin-section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
  }

  /* Add game form */
  .add-game-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 48px;
    border: 1px solid var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  /* Admin game list */
  .admin-game-item {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .admin-game-info { flex: 1; }
  .admin-game-match {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .admin-game-details {
    font-size: 13px;
    color: var(--gray);
  }

  .admin-game-score {
    font-size: 24px;
    font-weight: 800;
    margin: 0 32px;
    font-variant-numeric: tabular-nums;
  }

  .admin-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--gray);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .icon-btn:hover { background: #222; color: var(--white); }
  .icon-btn.delete:hover { border-color: rgba(232,0,29,0.4); color: var(--red); }

  /* Edit inline */
  .edit-row {
    display: none;
    background: #1A1A1A;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 10px;
    border: 1px solid rgba(232,0,29,0.2);
  }
  .edit-row.open { display: block; }
  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  /* ─── KEYFRAMES ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50%       { opacity: 0.8; transform: scaleY(1.1); }
  }

  /* Red glow ambience */
  .hero-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,0,29,0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* No games placeholder */
  .no-games {
    text-align: center;
    padding: 64px 32px;
    color: rgba(255,255,255,0.2);
    font-size: 15px;
    letter-spacing: 0.05em;
  }

  /* Status select colors */
  select option { background: #1E1E1E; }

  @media (max-width: 600px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .hero-title { font-size: 60px; }
    .form-grid, .edit-grid { grid-template-columns: 1fr; }
    .game-card { grid-template-columns: 1fr; text-align: center; }
    .team.away { align-items: flex-start; }
    .admin-nav { padding: 0 20px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Copa <span>Familia</span></div>
  <div class="nav-links">
    <a href="#games">Spiele</a>
    <a href="#bracket">Bracket</a>
  </div>
  <button class="nav-admin-btn" onclick="openLogin()">Admin</button>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-glow"></div>
  <div class="hero-eyebrow">Torneo Internacional</div>
  <h1 class="hero-title">COPA<br><span class="red">FAMILIA</span></h1>
  <p class="hero-sub">El torneo de las naciones</p>

  <div class="trophy-container" id="trophyContainer">
    <div class="trophy-inner" id="trophyInner">
      <!-- SVG Trophy (styled after the silver cup in Image 2) -->
      <svg class="trophy-svg" viewBox="0 0 180 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="silverBody" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0f0f0"/>
            <stop offset="30%" stop-color="#d8d8d8"/>
            <stop offset="50%" stop-color="#ffffff"/>
            <stop offset="70%" stop-color="#c0c0c0"/>
            <stop offset="100%" stop-color="#a8a8a8"/>
          </linearGradient>
          <linearGradient id="silverBase" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2a2a2a"/>
            <stop offset="50%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
          </linearGradient>
          <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c8a050"/>
            <stop offset="50%" stop-color="#f0d080"/>
            <stop offset="100%" stop-color="#c8a050"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>

        <!-- Base / pedestal -->
        <rect x="30" y="230" width="120" height="22" rx="4" fill="url(#silverBase)"/>
        <rect x="36" y="228" width="108" height="6" rx="2" fill="#333"/>

        <!-- Stem lower -->
        <rect x="78" y="190" width="24" height="40" rx="4" fill="url(#silverBody)"/>

        <!-- Knob/ball in middle of stem -->
        <ellipse cx="90" cy="200" rx="18" ry="12" fill="url(#silverBody)"/>
        <ellipse cx="90" cy="200" rx="14" ry="8" fill="#e8e8e8"/>

        <!-- Stem upper -->
        <rect x="80" y="155" width="20" height="50" rx="3" fill="url(#silverBody)"/>

        <!-- Cup bowl -->
        <path d="M 42 155 Q 40 120 55 100 Q 68 82 90 78 Q 112 82 125 100 Q 140 120 138 155 Z" fill="url(#silverBody)"/>
        <!-- Bowl inner shadow -->
        <path d="M 52 150 Q 51 122 63 105 Q 74 90 90 86 Q 106 90 117 105 Q 129 122 128 150 Z" fill="#c8c8c8" opacity="0.5"/>
        <!-- Bowl top rim -->
        <ellipse cx="90" cy="155" rx="48" ry="10" fill="url(#silverBody)"/>
        <ellipse cx="90" cy="155" rx="44" ry="7" fill="#e0e0e0"/>

        <!-- Cup handles / wings (left) -->
        <path d="M 46 130 Q 20 115 22 100 Q 24 85 42 88 Q 52 108 55 128 Z" fill="url(#silverBody)"/>
        <path d="M 46 130 Q 28 118 30 105 Q 32 94 44 96 Q 52 113 54 128 Z" fill="#e0e0e0" opacity="0.6"/>
        <!-- Left wing detail lines -->
        <line x1="38" y1="110" x2="50" y2="120" stroke="#b0b0b0" stroke-width="1.5" opacity="0.7"/>
        <line x1="34" y1="116" x2="46" y2="125" stroke="#b0b0b0" stroke-width="1" opacity="0.5"/>

        <!-- Cup handles / wings (right) -->
        <path d="M 134 130 Q 160 115 158 100 Q 156 85 138 88 Q 128 108 125 128 Z" fill="url(#silverBody)"/>
        <path d="M 134 130 Q 152 118 150 105 Q 148 94 136 96 Q 128 113 126 128 Z" fill="#e0e0e0" opacity="0.6"/>
        <!-- Right wing detail lines -->
        <line x1="142" y1="110" x2="130" y2="120" stroke="#b0b0b0" stroke-width="1.5" opacity="0.7"/>
        <line x1="146" y1="116" x2="134" y2="125" stroke="#b0b0b0" stroke-width="1" opacity="0.5"/>

        <!-- Top of cup opening (open top) -->
        <ellipse cx="90" cy="80" rx="48" ry="10" fill="#cccccc" opacity="0.4"/>

        <!-- Decorative engraving on bowl -->
        <path d="M 65 130 Q 90 118 115 130" stroke="#b8b8b8" stroke-width="1.5" fill="none" opacity="0.7"/>
        <path d="M 60 140 Q 90 126 120 140" stroke="#b8b8b8" stroke-width="1" fill="none" opacity="0.5"/>

        <!-- Star on bowl -->
        <text x="90" y="118" text-anchor="middle" font-size="18" fill="#E8001D" opacity="0.9" font-weight="bold">★</text>

        <!-- Shine reflection on bowl -->
        <path d="M 62 100 Q 72 88 84 86" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 65 110 Q 76 98 90 95" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- GAMES SECTION -->
<section class="ticker-section" id="games">
  <div class="section-label">Live Ticker</div>
  <h2 class="section-title">Spielstand</h2>
  <div class="games-list" id="gamesList"></div>
</section>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-title">Admin Zugang</div>
    <div class="modal-sub">Gib dein Passwort ein um die Spiele zu verwalten.</div>
    <div class="input-group">
      <label>Passwort</label>
      <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()">
    </div>
    <div class="error-msg" id="errorMsg">Falsches Passwort. Bitte nochmal versuchen.</div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeLogin()">Abbrechen</button>
      <button class="btn btn-primary" onclick="checkLogin()">Einloggen</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-nav">
    <div class="admin-title">Copa <span>Familia</span> — Admin</div>
    <button class="close-btn" onclick="closeAdmin()">✕ Schließen</button>
  </div>
  <div class="admin-body">

    <!-- Add Game Form -->
    <div class="add-game-card">
      <div class="admin-section-title">Spiel hinzufügen</div>
      <div class="form-grid">
        <div class="input-group" style="margin-bottom:0">
          <label>Heimteam (Land + Flag)</label>
          <input type="text" id="f_home" placeholder="z.B. 🇩🇪 Deutschland">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Auswärtsteam (Land + Flag)</label>
          <input type="text" id="f_away" placeholder="z.B. 🇧🇷 Brasilien">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Tore Heim</label>
          <input type="number" id="f_hscore" placeholder="0" min="0">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Tore Auswärts</label>
          <input type="number" id="f_ascore" placeholder="0" min="0">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Phase / Runde</label>
          <select id="f_phase">
            <option value="Gruppenphase">Gruppenphase</option>
            <option value="Achtelfinale">Achtelfinale</option>
            <option value="Viertelfinale">Viertelfinale</option>
            <option value="Halbfinale">Halbfinale</option>
            <option value="Finale">Finale</option>
          </select>
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Status</label>
          <select id="f_status">
            <option value="live">Live</option>
            <option value="upcoming">Geplant</option>
            <option value="finished">Beendet</option>
          </select>
        </div>
      </div>
      <div class="input-group">
        <label>Zeit / Info</label>
        <input type="text" id="f_time" placeholder="z.B. 67' oder 18:00 Uhr">
      </div>
      <button class="btn btn-primary" style="max-width:200px" onclick="addGame()">+ Spiel hinzufügen</button>
    </div>

    <!-- Games list -->
    <div class="admin-section-title">Alle Spiele</div>
    <div id="adminGamesList"></div>
  </div>
</div>

<script>
// ── STATE ──
const ADMIN_PASSWORD = 'copa2026';

let games = [
  { id: 1, home: '🇩🇪 Deutschland', away: '🇧🇷 Brasilien', hscore: 2, ascore: 1, phase: 'Halbfinale', status: 'live', time: "73'" },
  { id: 2, home: '🇦🇷 Argentinien', away: '🇲🇽 Mexiko', hscore: 0, ascore: 0, phase: 'Halbfinale', status: 'upcoming', time: '21:00 Uhr' },
  { id: 3, home: '🇨🇴 Kolumbien', away: '🇺🇾 Uruguay', hscore: 3, ascore: 2, phase: 'Viertelfinale', status: 'finished', time: 'FT' },
];
let nextId = 4;

// ── TROPHY SCROLL ──
window.addEventListener('scroll', () => {
  const scrollY = window.scrollY;
  const trophy = document.getElementById('trophyInner');
  if (!trophy) return;
  const rotateY = scrollY * 0.5; // degrees per pixel
  const tiltX = Math.min(scrollY * 0.05, 15);
  trophy.style.transform = `rotateY(${rotateY}deg) rotateX(${tiltX}deg)`;
});

// ── RENDER PUBLIC ──
function renderGames() {
  const list = document.getElementById('gamesList');
  if (games.length === 0) {
    list.innerHTML = '<div class="no-games">Noch keine Spiele geplant.</div>';
    return;
  }
  list.innerHTML = games.map(g => {
    const parts = g.home.split(' ');
    const homeFlag = parts[0]; const homeName = parts.slice(1).join(' ');
    const aparts = g.away.split(' ');
    const awayFlag = aparts[0]; const awayName = aparts.slice(1).join(' ');

    let badgeClass = g.status === 'live' ? '' : (g.status === 'upcoming' ? 'upcoming-badge' : 'finished-badge');
    let statusHtml = g.status === 'live'
      ? `<div class="live-dot"><div class="dot"></div> Live ${g.time}</div>`
      : `<div class="game-time">${g.time}</div>`;

    const scoreDisplay = g.status === 'upcoming'
      ? `<div class="score" style="font-size:28px;color:rgba(255,255,255,0.3)">vs</div>`
      : `<div class="score">${g.hscore} : ${g.ascore}</div>`;

    return `
      <div class="game-card ${g.status}">
        <div class="team home">
          <div class="team-flag">${homeFlag}</div>
          <div class="team-name">${homeName}</div>
        </div>
        <div class="game-center">
          ${scoreDisplay}
          <div class="game-meta">
            <div class="phase-badge ${badgeClass}">${g.phase}</div>
            ${statusHtml}
          </div>
        </div>
        <div class="team away">
          <div class="team-flag">${awayFlag}</div>
          <div class="team-name">${awayName}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── RENDER ADMIN ──
function renderAdmin() {
  const list = document.getElementById('adminGamesList');
  if (games.length === 0) {
    list.innerHTML = '<div class="no-games">Noch keine Spiele.</div>';
    return;
  }
  list.innerHTML = games.map(g => `
    <div>
      <div class="admin-game-item">
        <div class="admin-game-info">
          <div class="admin-game-match">${g.home} vs ${g.away}</div>
          <div class="admin-game-details">${g.phase} · ${g.status === 'live' ? '🔴 Live' : g.status === 'upcoming' ? '⏰ Geplant' : '✅ Beendet'} · ${g.time}</div>
        </div>
        <div class="admin-game-score">${g.status === 'upcoming' ? '–' : g.hscore + ':' + g.ascore}</div>
        <div class="admin-actions">
          <button class="icon-btn" onclick="toggleEdit(${g.id})" title="Bearbeiten">✏️</button>
          <button class="icon-btn delete" onclick="deleteGame(${g.id})" title="Löschen">🗑️</button>
        </div>
      </div>
      <div class="edit-row" id="edit_${g.id}">
        <div class="edit-grid">
          <div class="input-group" style="margin-bottom:0">
            <label>Heimteam</label>
            <input type="text" id="e_home_${g.id}" value="${g.home}">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label>Auswärtsteam</label>
            <input type="text" id="e_away_${g.id}" value="${g.away}">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label>Tore Heim</label>
            <input type="number" id="e_hs_${g.id}" value="${g.hscore}" min="0">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label>Tore Auswärts</label>
            <input type="number" id="e_as_${g.id}" value="${g.ascore}" min="0">
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label>Phase</label>
            <select id="e_ph_${g.id}">
              ${['Gruppenphase','Achtelfinale','Viertelfinale','Halbfinale','Finale'].map(p=>
                `<option value="${p}" ${g.phase===p?'selected':''}>${p}</option>`
              ).join('')}
            </select>
          </div>
          <div class="input-group" style="margin-bottom:0">
            <label>Status</label>
            <select id="e_st_${g.id}">
              <option value="live" ${g.status==='live'?'selected':''}>Live</option>
              <option value="upcoming" ${g.status==='upcoming'?'selected':''}>Geplant</option>
              <option value="finished" ${g.status==='finished'?'selected':''}>Beendet</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Zeit / Info</label>
          <input type="text" id="e_ti_${g.id}" value="${g.time}">
        </div>
        <div class="btn-row" style="margin-top:0">
          <button class="btn btn-secondary" onclick="toggleEdit(${g.id})">Abbrechen</button>
          <button class="btn btn-primary" onclick="saveEdit(${g.id})">Speichern</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleEdit(id) {
  const el = document.getElementById('edit_' + id);
  el.classList.toggle('open');
}

function saveEdit(id) {
  const g = games.find(x => x.id === id);
  if (!g) return;
  g.home = document.getElementById('e_home_' + id).value;
  g.away = document.getElementById('e_away_' + id).value;
  g.hscore = parseInt(document.getElementById('e_hs_' + id).value) || 0;
  g.ascore = parseInt(document.getElementById('e_as_' + id).value) || 0;
  g.phase = document.getElementById('e_ph_' + id).value;
  g.status = document.getElementById('e_st_' + id).value;
  g.time = document.getElementById('e_ti_' + id).value;
  renderGames();
  renderAdmin();
}

function deleteGame(id) {
  games = games.filter(g => g.id !== id);
  renderGames();
  renderAdmin();
}

function addGame() {
  const home = document.getElementById('f_home').value.trim();
  const away = document.getElementById('f_away').value.trim();
  if (!home || !away) { alert('Bitte beide Teams eingeben.'); return; }
  games.unshift({
    id: nextId++,
    home,
    away,
    hscore: parseInt(document.getElementById('f_hscore').value) || 0,
    ascore: parseInt(document.getElementById('f_ascore').value) || 0,
    phase: document.getElementById('f_phase').value,
    status: document.getElementById('f_status').value,
    time: document.getElementById('f_time').value || '–'
  });
  // clear
  ['f_home','f_away','f_hscore','f_ascore','f_time'].forEach(id => document.getElementById(id).value = '');
  renderGames();
  renderAdmin();
}

// ── AUTH ──
function openLogin() {
  document.getElementById('loginModal').classList.add('open');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function closeLogin() {
  document.getElementById('loginModal').classList.remove('open');
  document.getElementById('pwInput').value = '';
  document.getElementById('errorMsg').style.display = 'none';
}
function checkLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    closeLogin();
    openAdmin();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
function openAdmin() {
  document.getElementById('adminPanel').classList.add('open');
  renderAdmin();
}
function closeAdmin() {
  document.getElementById('adminPanel').classList.remove('open');
  renderGames();
}

// ── INIT ──
renderGames();
</script>
</body>
</html>
